name: bioalga
description: "BioAlga - Marine Algae Classification App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.0
  shared_preferences: ^2.5.3
  http: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.8.3
  printing: ^5.14.2
  pdf: ^3.11.3
  open_file: ^3.5.10
  intl: ^0.20.2
  bidi: ^2.0.13
  mime: ^1.0.6  # ✅ جديد: لفحص أنواع الملفات
  google_fonts: ^8.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/App_Logo.png
    - assets/fonts/Cairo-Regular.ttf
    # ✅ تم حذف assets/models/ لأننا لا نستخدم النموذج المحلي

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/App_Logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/images/App_Logo.png
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/App_Logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/App_Logo.png"

android:
  buildTypes:
    release:
      manifestPlaceholders:
        usesCleartextTraffic: false
    debug:
      manifestPlaceholders:
        usesCleartextTraffic: true
  compileSdkVersion: 34
  minSdkVersion: 21
  targetSdkVersion: 34

ios:
  deploymentTarget: '13.0'
  usesSwiftPackageManager: true
  supportsSwiftPackageManagerXCFrameworks: true